# PhishGuard API — matches frontend default http://localhost:8081
server.port=8081

spring.application.name=phishguard-api

# MySQL — create database phishguard and set credentials
spring.datasource.url=jdbc:mysql://localhost:3306/phishguard_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Avoid reserved table name issues
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
